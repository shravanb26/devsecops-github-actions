name: DevSecOps CI Pipeline

# Triggers on pushes/PRs to main, skipping paths that would cause infinite loops
on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'kubernetes/**'  # Prevent infinite loops
      - 'README.md'
      - 'assets/**'
      - '.github/workflows/README.md'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # Gate job: scans for leaked secrets and vulnerable dependencies before any build work
  security-prechecks:
    name: Security Prechecks
    runs-on: ubuntu-latest
    steps:
      # Git Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # fetch all history for all branches and tags

      # Scans full git history for accidentally committed secrets (tokens, passwords, keys)
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # Scans source and dependencies for CRITICAL/HIGH CVEs; fails pipeline if any found
      - name: Trivy FS Scan (JSON)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: json
          output: trivy-results.json
          exit-code: 1

      - name: Trivy FS Scan (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif
          exit-code: 0

      #upload JSON artifact for further processing (e.g., in a dashboard or reporting tool)
      - name: Upload Trivy JSON Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-json-report
          path: trivy-results.json
      #upload SARRIF artifact for further processing (e.g., in a dashboard or reporting tool)
      - name: Upload SARIF Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif


  # Runs unit tests only after security gates pass, ensuring unsafe code never reaches test stage
  unit-test:
    name: Unit Testing
    needs: security-prechecks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # SetUp NodeJs Env
      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      # Uses npm ci instead of npm install for a clean, reproducible dependency install
      - name: Install Dependencies
        run: npm ci

      # Run Unit Tests
      - name: Run Unit Tests
        run: npm test

  static-testing:
    name: Static Code Quality
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      # Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # SonarCloud Analysis
      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # Quality Gate Enforcement
      - name: SonarCloud Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-artifacts:
    name: Build and Store Artifacts
    runs-on: ubuntu-latest
    needs: static-testing
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # SetUp NodeJs Env
      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with: 
          node-version: 24
          cache: npm
          
      # Install Dependencies
      - name: Install Dependencies
        run: npm ci

      # Build Project
      - name: Build Project
        run: npm run build

      # Upload Artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/

  docker:
    name: Container Build & Security
    runs-on: ubuntu-latest
    needs: build-artifacts
    permissions:
      contents: read 
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
      IMAGE_TAG: ${{ github.sha }}
    outputs:
      image_tag: ${{ steps.export-image-tag.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  
      # Download build artifacts
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist/

      # Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
  
      # Login to GHCR 
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}
  
      # Build Docker Image
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ci
          load: true  # load image into the local Docker daemon of this GitHub runner
          push: false
          tags: ghcr.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}